<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a6d94, #a1a3b3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .success-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 90%;
        }

        .success-icon {
            font-size: 60px;
            color: #4CAF50;
        }

        h1 {
            margin: 15px 0;
            color: #333;
        }

        p {
            color: #555;
            margin: 8px 0;
            font-size: 16px;
        }

        .order-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #388e3c;
        }
    </style>
</head>

<body>

    <div class="success-container">
        <div class="success-icon">✔</div>
        <h1>Order Successful 🎉</h1>

        <div class="order-info">
            <p><strong>Order ID:</strong> {{ order.id }}</p>
            <p><strong>Amount Paid:</strong> Rs {{ order.amount }}</p>
        </div>

        <a href="{% url 'customer_dashboard' %}" class="btn">
            Go to Dashboard
        </a>
    </div>

</body>
</html>
